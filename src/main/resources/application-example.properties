spring.application.name=tone-engine-ver2

# database
spring.datasource.url=jdbc:postgresql://localhost:5432/ToneEngine
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# scoring
tone-advisor.scoring.frequency.high=0.3
tone-advisor.scoring.frequency.mid=0.2
tone-advisor.scoring.frequency.low=0.1
tone-advisor.scoring.warmth=0.5
tone-advisor.scoring.bonus.gain-match=40.0
tone-advisor.scoring.bonus.pickup-match=50.0
tone-advisor.scoring.output-power=25
tone-advisor.scoring.balance.pedal=0.15
tone-advisor.scoring.balance.guitar=0.5
tone-advisor.scoring.balance.amplifier=0.35

server.servlet.context-path=/api

# security
jwt.secret=${JWT_SECRET}