<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tone engine - Advisor</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- css -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-info p-3">
    <div class="container-fluid">
        <a th:href="@{/home}" class="brand-logo fw-bold" style="letter-spacing: 3px;">TONE ENGINE</a>
        <div class="navbar-nav ms-auto">
            <a th:href="@{/home}" class="nav-link">
                STORE
            </a>
            <a th:href="@{/tone-advisor}" class="nav-link active text-info">
                TONE ADVISOR
            </a>
            <a th:href="@{/cartDto}" class="nav-link">
                <i class="bi bi-cart4"></i>
            </a>
        </div>
    </div>
</nav>
<div class="container-fluid py-4 px-4">
    <div class="row g-3">

        <!-- left (filters) -->
        <aside class="col-lg-3 col-xl-2">
            <form th:action="@{/tone-advisor}" method="get" id="filterForm" class="rpg-panel h-100">
                <input type="hidden" name="albumId" th:value="${selectedAlbum != null ? selectedAlbum.album.id : ''}">
                <div class="mb-4">
                    <label class="form-label small">GENRE</label>
                    <select name="genre" class="form-select form-select-sm bg-dark text-white border-secondary"
                            onchange="this.form.submit()">
                        <option value="">All Genres</option>
                        <option th:each="g : ${genres}"
                                th:value="${g}"
                                th:selected="${param.genre != null && param.genre[0] == g.name()}"
                                th:text="${g.description}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">

                    <label class="form-label small">BUDGET: <span class="text-info" id="budgetValue" th:text="|$${param.budget ?: 1350}|">$1350</span></label>

                    <input type="range" id="budgetRange" name="budget" class="form-range"
                           min="300" max="3000" th:value="${param.budget ?: 1350}"
                           oninput="document.getElementById('budgetValue').innerText = '$' + this.value"
                           onchange="this.form.submit()">
                </div>

                <div class="mt-4">
                    <a th:href="@{/home}" class="btn btn-outline-info w-100 py-2 text-uppercase fw-bold" style="letter-spacing: 1px;">
                        Back to main shop
                    </a>
                </div>
            </form>
        </aside>

        <!-- center (albums) -->
        <main class="col-lg-5 col-xl-7">
            <div class="rpg-panel">
                <div class="d-flex justify-content-between mb-4 border-bottom border-secondary pb-2">
                    <h5 class="text-uppercase mb-0" th:text="|Matches Found: ${albums.size()}|">Matches Found: 0</h5>
                </div>

                <div class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
                    <!-- Заменяем c:forEach на th:each -->
                    <div class="col text-center" th:each="album : ${albums}">
                        <a th:href="@{/tone-advisor(albumId=${album.id}, genre=${param.genre}, budget=${param.budget})}" class="text-decoration-none">
                            <div class="album-card" th:classappend="${selectedAlbum != null && selectedAlbum.album.id == album.id} ? 'active' : ''">
                                <div class="bg-black rounded mb-2 overflow-hidden" style="aspect-ratio: 1 / 1; width: 100%;">
                                    <img th:src="${album.coverUrl}" th:alt="${album.title}" class="w-100 h-100" style="object-fit: cover;">
                                </div>
                                <div class="small fw-bold text-uppercase text-white" th:text="${album.artist}">Artist</div>
                                <div class="small text-secondary" th:text="${album.title}">Title</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <!-- right (sound details) -->
        <aside class="col-lg-4 col-xl-3">
            <div th:if="${selectedAlbum != null}" class="rpg-panel h-100 d-flex flex-column">
                <h6 th:text="|Gear Details: ${selectedAlbum.album.artist}|">Gear Details</h6>
                <div th:each="gear : ${selectedAlbum.gear}" class="gear-slot d-flex align-items-center mb-3">
                    <div class="flex-grow-1">
                        <div th:text="${gear.equipmentType}" class="small text-secondary" style="font-size: 0.65rem;">TYPE</div>
                        <div th:text="|${gear.brand} ${gear.model}|" class="small fw-bold">Brand Model</div>
                    </div>
                    <div th:text="|$${gear.price}|" class="text-info fw-bold small">$0</div>
                </div>

                <div class="eq-container mt-4">
                    <div class="eq-title">FREQUENCY SPECTRUM</div>
                    <div class="eq-wrapper">
                        <div class="eq-bar-container">
                            <div th:each="freq : ${selectedAlbum.frequencies}" th:style="|height: ${freq}%|" class="eq-bar"></div>
                        </div>
                        <div class="eq-labels">
                            <span>60</span><span>150</span><span>400</span><span class="active-freq">1k</span><span>2.4k</span><span>6k</span><span>15k</span>
                        </div>
                    </div>
                </div>

                <div class="mt-auto pt-4 border-top border-secondary">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="small">TOTAL MATCH PRICE</span>
                        <span th:text="|$${selectedAlbum.totalPrice}|" class="text-warning fs-4 fw-bold">$0.00</span>
                    </div>
                    <p class="text-success small mb-3">
                        <i th:text="${selectedAlbum.album.genre.description}" class="bi bi-shield-check me-1"></i> Perfect match for <span>Genre</span>
                    </p>
                    <form th:action="@{/cartDto/add-set}" method="post">
                        <input th:value="${selectedAlbum.album.id}" type="hidden" name="albumId">
                        <button class="btn btn-success w-100 py-2 fw-bold">ADD FULL SET TO CART</button>
                    </form>
                </div>
            </div>

            <div th:unless="${selectedAlbum != null}" class="rpg-panel h-100 d-flex align-items-center justify-content-center">
                <p class="text-secondary italic">Select an album to analyze tone</p>
            </div>
        </aside>

    </div>
</div>
</body>
</html>
