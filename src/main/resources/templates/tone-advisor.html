<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tone engine - Advisor</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- css -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-info p-3">
    <div class="container-fluid">
        <a th:href="@{/home}" class="brand-logo fw-bold" style="letter-spacing: 3px;">TONE ENGINE</a>
        <div class="navbar-nav ms-auto">
            <a th:href="@{/home}" class="nav-link">
                STORE
            </a>
            <a th:href="@{/tone-advisor}" class="nav-link active text-info">
                TONE ADVISOR
            </a>
            <a th:href="@{/cart}" class="nav-link">
                <i class="bi bi-cart4"></i>
            </a>
        </div>
    </div>
</nav>
<div class="container-fluid py-4 px-4">
    <div class="row g-3">

        <!-- left (filters) -->
        <aside class="col-lg-3 col-xl-2">
            <form th:action="@{/tone-advisor}" method="get" id="filterForm" class="rpg-panel h-100">
                <input type="hidden" name="albumId" th:value="${advisorResponse != null ? advisorResponse.album.id : ''}">
                <div class="mb-4">
                    <label class="form-label small">GENRE</label>
                    <select name="genre" class="form-select form-select-sm bg-dark text-white border-secondary"
                            onchange="this.form.submit()">
                        <option value="">All Genres</option>
                        <option th:each="g : ${genres}"
                                th:value="${g}"
                                th:selected="${param.genre != null && param.genre[0] == g.name()}"
                                th:text="${g.description}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">

                    <label class="form-label small">BUDGET: <span class="text-info" id="budgetValue" th:text="|$${param.budget ?: 1350}|">$1350</span></label>

                    <input type="range" id="budgetRange" name="budget" class="form-range"
                           min="1000" max="10000" th:value="${param.budget ?: 3000}"
                           oninput="document.getElementById('budgetValue').innerText = '$' + this.value"
                           onchange="this.form.submit()">
                </div>

                <div class="mt-4">
                    <a th:href="@{/home}" class="btn btn-outline-info w-100 py-2 text-uppercase fw-bold" style="letter-spacing: 1px;">
                        Back to main shop
                    </a>
                </div>
            </form>
        </aside>

        <!-- center (albums) -->
        <main class="col-lg-5 col-xl-7">
            <div class="rpg-panel">
                <div class="d-flex justify-content-between mb-4 border-bottom border-secondary pb-2">
                    <h5 class="text-uppercase mb-0" th:text="|Matches Found: ${albums.size()}|">Matches Found: 0</h5>
                </div>

                <div class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
                    <div class="col text-center" th:each="album : ${albums}">
                        <a th:href="@{/tone-advisor(albumId=${album.id}, genre=${param.genre}, budget=${param.budget ?: 1350})}" class="text-decoration-none">
                            <div class="album-card" th:classappend="${advisorResponse != null && advisorResponse.album.id == album.id} ? 'active' : ''">
                                <div class="bg-black rounded mb-2 overflow-hidden" style="aspect-ratio: 1 / 1; width: 100%;">
                                    <img th:src="${album.coverUrl}" th:alt="${album.title}" class="w-100 h-100" style="object-fit: cover;">
                                </div>
                                <div class="small fw-bold text-uppercase text-white" th:text="${album.artist}">Artist</div>
                                <div class="small text-secondary" th:text="${album.title}">Title</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <!-- right (sound details) -->
        <aside class="col-lg-4 col-xl-3">
            <div th:if="${advisorResponse != null}" class="rpg-panel h-100 d-flex flex-column">
                <h6 th:text="|Details: ${advisorResponse.album.artist}|">Details</h6>

                <div th:if="${not #lists.isEmpty(advisorResponse.equipmentList)}" class="d-flex flex-column flex-grow-1">
                    <div th:each="equipmentList : ${advisorResponse.equipmentList}" class="equipmentList-slot d-flex align-items-center mb-3">
                        <div class="bg-dark rounded p-1 me-3 d-flex align-items-center justify-content-center"
                             style="width: 100px; height: 100px; border: 1px solid #333;">
                            <img th:src="${equipmentList.imageUrl}"
                                 th:alt="${equipmentList.model}"
                                 class="img-fluid"
                                 style="max-height: 100%; object-fit: contain;">
                        </div>
                        <div class="flex-grow-1">
                            <div th:text="${equipmentList.equipmentType}" class="small text-secondary" style="font-size: 0.65rem;">TYPE</div>
                            <div th:text="|${equipmentList.brand} ${equipmentList.model}|" class="small fw-bold">Brand Model</div>
                        </div>
                        <div th:text="|$${equipmentList.price}|" class="text-info fw-bold small">$0</div>
                    </div>

                    <div class="eq-container mt-4">
                        <div class="eq-title">FREQUENCY SPECTRUM</div>
                        <div class="eq-wrapper">
                            <div class="eq-bar-container">
                                <div th:each="freq : ${advisorResponse.frequencies}" th:style="|height: ${freq}%|" class="eq-bar"></div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-top border-secondary">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="small">TOTAL MATCH PRICE</span>
                            <span th:text="|$${advisorResponse.totalPrice}|" class="text-warning fs-4 fw-bold">$0.00</span>
                        </div>
                        <form th:action="@{/cart/add-set}" method="post">
                            <input th:value="${advisorResponse.album.id}" type="hidden" name="albumId">
                            <button class="btn btn-success w-100 py-2 fw-bold">ADD FULL SET TO CART</button>
                        </form>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(advisorResponse.equipmentList)}" class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-center">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3"></i>
                    <h5 class="cormorant-unicase-regular">Matches not found</h5>
                    <p class="text-white-50 small">Your budget is too low for this album's tone.</p>
                    <p class="text-info small">Try increasing the budget slider.</p>
                </div>
            </div>

            <div th:unless="${advisorResponse != null}" class="rpg-panel h-100 d-flex align-items-center justify-content-center">
                <p class="text-secondary italic">Select an album to analyze tone</p>
            </div>
        </aside>

    </div>
</div>
</body>
</html>
