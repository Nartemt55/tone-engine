<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tone engine - Store</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- css -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-info p-3">
    <div class="container-fluid">
        <a th:href="@{/home}" class="brand-logo fw-bold" style="letter-spacing: 3px;">TONE ENGINE</a>
        <div class="navbar-nav ms-auto">
            <a th:href="@{/home}" class="nav-link active text-info">
                STORE
            </a>
            <a th:href="@{/tone-advisor}" class="nav-link">
                TONE ADVISOR
            </a>
            <a th:href="@{/cart}" class="nav-link">
                <i class="bi bi-cart4"></i>
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row g-4">

        <!-- sidebar -->
        <aside class="col-lg-3 col-xl-2">
            <form th:action="@{/home}" method="get">
                <input th:value="${param.type}" type="hidden" name="type">
                <div class="rpg-panel sticky-top" style="top: 20px;">
                    <h6 class="cormorant-unicase-regular text-uppercase mb-3">Musical equipment</h6>

                    <div class="list-group list-group-flush">
                        <a th:href="@{/home(type='guitar', sort=${param.sort})}" th:classappend="${param.type != null && param.type[0] == 'guitar'} ? 'active text-info' : ''" class="list-group-item list-group-item-action bg-transparent text-white border-secondary small">
                            <i class="bi bi-music-note-beamed me-2"></i> GUITARS
                        </a>
                        <a th:href="@{/home(type='pedal', sort=${param.sort})}" th:classappend="${param.type != null && param.type[0] == 'pedal'} ? 'active text-info' : ''" class="list-group-item list-group-item-action bg-transparent text-white border-secondary small">
                            <i class="bi bi-cpu me-2"></i> PEDALS
                        </a>
                        <a th:href="@{/home(type='amplifier', sort=${param.sort})}" th:classappend="${param.type != null && param.type[0] == 'amplifier'} ? 'active text-info' : ''" class="list-group-item list-group-item-action bg-transparent text-white border-secondary small">
                            <i class="bi bi-speaker me-2"></i> AMPLIFIERS
                        </a>
                        <a th:href="@{/home(sort=${param.sort})}" class="list-group-item list-group-item-action bg-transparent text-white-50 border-secondary x-small">
                            <i class="bi bi-list me-2"></i> SHOW ALL
                        </a>
                    </div>
                    <div class="mb-4">
                        <select name="sort" class="form-select bg-dark text-white border-secondary" onchange="this.form.submit()">
                            <option th:selected="${param.sort != null && param.sort[0] == 'asc'}" value="asc">Cheap first</option>
                            <option th:selected="${param.sort != null && param.sort[0] == 'desc'}" value="desc">Expensive first</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 px-2">
                    <a th:href="@{/tone-advisor}" class="btn btn-outline-info w-100 py-2 fs-5 d-flex align-items-center justify-content-center">
                        <i class="bi bi-lightbulb me-2"></i> Try Tone Advisor
                    </a>
                </div>
            </form>
        </aside>

        <!-- main grid -->
        <main class="col-lg-9 col-xl-10">
            <div class="rpg-panel shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                    <h4 class="cormorant-unicase-regular mb-0 text-uppercase fw-bold">Available Gear</h4>
                    <span th:text="|${products.size()} items|" class="badge bg-secondary"></span>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 row-cols-xxl-4 g-4">
                    <div th:each="product: ${products}" class="col">
                        <div class="gear-card p-3 h-100 d-flex flex-column">
                            <div class="text-center bg-dark rounded mb-3 overflow-hidden" style="height: 200px;">
                                <img th:src="${product.imageUrl}" th:alt="${product.model}" class="img-fluid h-100 w-100 object-fit-contain">
                            </div>
                            <h6 th:text="${product.brand}" class="mb-1"></h6>
                            <p th:text="${product.model}" class="small text-white-50 flex-grow-1"></p>
                            <div class="d-flex justify-content-between align-items-end mt-3">

                                <div th:text="|${product.price} $|" class="price-tag"></div>

                                <form th:action="@{/cart/add}" method="post" class="m-0">
                                    <input th:value="${product.id}" type="hidden" name="id">

                                    <button type="submit" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-plus-lg"></i> Add to cart
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
