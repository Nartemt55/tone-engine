<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tone Engine - Cart</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- css -->
    <link rel="stylesheet" href="/css/style.css">

   <!-- fonts -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
       <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
       <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-info p-3">
    <div class="container-fluid">
        <a th:href="@{/home}" class="brand-logo fw-bold" style="letter-spacing: 3px;">TONE ENGINE</a>
        <div class="navbar-nav ms-auto">
            <a th:href="@{/home}" class="nav-link">
                STORE
            </a>
            <a th:href="@{/tone-advisor}" class="nav-link">
                TONE ADVISOR
            </a>
            <a th:href="@{/cart}" class="nav-link active text-info">
                <i class="bi bi-cart4"></i>
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="rpg-panel">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                    <h4 class="cormorant-unicase-regular mb-0 text-uppercase fw-bold">Current Loadout</h4>
                    <span th:text="|${cart.itemsAmount} Items|" class="badge bg-secondary"></span>
                </div>

                <div th:if="${cart == null || cart.cartItems.isEmpty()}" class="text-center py-5">
                    <p class="text-white-50">Cart is empty.</p>
                    <a th:href="@{/home}" class="btn btn-outline-info btn-sm">Back to Store</a>
                </div>

                <div th:each="item : ${cart.cartItems}" class="gear-slot d-flex align-items-center justify-content-between mb-3">
                    <div class="d-flex align-items-center" style="min-width: 250px;">
                        <div class="bg-dark rounded p-1 me-3" style="height: 60px; width: 60px; border: 1px solid var(--border-color);">
                            <img th:src="${item.imageUrl}" class="img-fluid h-100 w-100 object-fit-contain">
                        </div>
                        <div>
                            <div th:text="${item.brand}" class="fw-bold text-uppercase small text-info">Brand</div>
                            <div th:text="${item.model}" class="text-white-50 small">Model</div>
                        </div>
                    </div>
                    <div class="d-flex align-items-center bg-dark rounded border border-secondary px-2 ms-auto me-auto" style="height: 38px;">

                        <!-- "-" button -->
                        <form th:action="@{/cart/decrement}" method="post" class="m-0">
                            <input type="hidden" name="id" th:value="${item.id}">
                            <button type="submit" class="btn btn-link text-info p-0" style="text-decoration: none;">
                                <i class="bi bi-dash-lg"></i>
                            </button>
                        </form>

                        <!-- item quantity -->
                        <span class="mx-3 fw-bold text-info" th:text="${item.quantity}" style="min-width: 20px; text-align: center;">1</span>

                        <!-- "+" button -->
                        <form th:action="@{/cart/increment}" method="post" class="m-0">
                            <input type="hidden" name="id" th:value="${item.id}">
                            <button type="submit" class="btn btn-link text-info p-0" style="text-decoration: none;">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </form>
                    </div>

                    <div class="d-flex align-items-center justify-content-end" style="min-width: 150px;">
                        <span th:text="|$${item.price * item.quantity}|" class="price-tag me-4"></span>
                        <form th:action="@{/cart/remove}" method="post" class="m-0">
                            <input th:value="${item.id}" type="hidden" name="id">
                            <button type="submit" class="btn btn-link text-danger p-0">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </form>
                    </div>

                </div>
                <div th:if="${cart != null && !cart.cartItems.isEmpty()}" class="text-center py-5">
                    <form th:action="@{/cart/clear}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2 px-3 py-2"
                                style="border-radius: 8px; transition: 0.3s;">
                            <i class="bi bi-trash3-fill"></i>
                            <span class="text-uppercase fw-bold" style="font-size: 0.8rem; letter-spacing: 1px;">Clear cart</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="rpg-panel">
                <h5 class="text-uppercase mb-4 border-bottom border-secondary pb-2">Summary</h5>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="h5 mb-0">Total</span>
                    <span th:text="|$${cart.totalPrice != null ? cart.totalPrice : 0}|" class="price-tag" style="font-size: 1.8rem;">$0</span>
                </div>
                <button th:disabled="${cart == null || cart.cartItems.isEmpty()}" class="btn btn-outline-info w-100 py-3 text-uppercase fw-bold">
                    Buy
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
